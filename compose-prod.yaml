services:
  mysql:
    image: 'mysql:latest'
    restart: always
    environment:
      MYSQL_DATABASE: baton
      MYSQL_USER: admin
      MYSQL_PASSWORD: ${LIVE_DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${LIVE_DB_ROOT_PASSWORD}
    ports:
      - '3306:3306'
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      timeout: 20s
      retries: 10

  backend:
    image: ujin3261/dev11-final-team03-service:latest
    restart: always
    ports:
      - '8080:8080'
    environment:
      SPRING_PROFILES_ACTIVE: "prod,secret"
      SENTRY_DSN: "${SENTRY_DSN}"
      SENTRY_ENVIRONMENT: "prod"
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/baton?serverTimezone=Asia/Seoul&characterEncoding=UTF-8"
      SPRING_DATASOURCE_USERNAME: "admin"
      SPRING_DATASOURCE_PASSWORD: "${LIVE_DB_PASSWORD}"
      SPRING_MAIL_HOST: "smtp.naver.com"
      SPRING_MAIL_PORT: 465
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: true
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_SSL_ENABLE: true

      SPRING_MAIL_PROPERTIES_MAIL_SMTP_SSL_TRUST: "smtp.naver.com"

      SPRING_MAIL_PROPERTIES_MAIL_SMTP_CONNECTIONTIMEOUT: 5000
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_TIMEOUT: 3000
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_WRITETIMEOUT: 5000
    depends_on:
      mysql:
        condition: service_healthy # ◀ 중요: MySQL 헬스체크가 통과되면 스프링이 켜짐
  frontend:
    image: ujin3261/dev11-final-team03-frontend:latest
    restart: always
    ports:
      - '3000:3000'

volumes:
    db_data:
      driver: local

