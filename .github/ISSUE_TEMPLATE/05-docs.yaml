name: "📝 5. Docs (문서 작업)"
description: "문서 관련 이슈 템플릿"
title: "[docs] "
labels: ["📝 docs"]
body:
  - type: textarea
    id: content
    attributes:
      label: "📋 수정/추가 내용"
      description: "수정하거나 추가할 문서 내용을 설명해주세요."
    validations:
      required: true
  - type: checkboxes
    id: purpose
    attributes:
      label: "🎯 작업 목적"
      description: "해당하는 항목을 선택해주세요. (복수 선택 가능)"
      options:
        - label: "README 작성 및 업데이트"
        - label: "API 명세서 작성 및 업데이트"
        - label: "코드 주석 추가 및 개선"
        - label: "기타"
  - type: textarea
    id: details
    attributes:
      label: "📌 세부 항목"
      value: |
        - [ ] 작업할 문서 명칭: 
        - [ ] 포함될 주요 내용: