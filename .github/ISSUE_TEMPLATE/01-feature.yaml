name: "✨ 1. Feature (신규 기능 추가)"
description: "기능 관련 이슈 템플릿"
title: "[feat] "
labels: ["✨ feature"]
body:
  - type: textarea
    id: description
    attributes:
      label: "✨ 기능 설명"
      description: "추가하려는 기능에 대해 자세히 설명해주세요."
    validations:
      required: true
  - type: textarea
    id: todo_list
    attributes:
      label: "✔️ 작업 목록"
      value: |
        - [ ] TODO1
        - [ ] TODO2
        - [ ] TODO3
    validations:
      required: true
  - type: textarea
    id: related_issue
    attributes:
      label: "🔗 관련 이슈"
      description: "관련된 이슈 번호를 적어주세요."
      value: "- #"