name: "♻️ 3. Refactor (코드 리팩토링)"
description: "리팩토링 관련 이슈 템플릿"
title: "[refactor] "
labels: ["♻️ refactor"]
body:
  - type: textarea
    id: problem
    attributes:
      label: "⚠️ 현재 문제점"
      description: "현재 코드의 문제점을 설명해주세요."
    validations:
      required: true
  - type: textarea
    id: improvement
    attributes:
      label: "💡 개선 방향"
      description: "어떤 방향으로 개선할지 설명해주세요."
    validations:
      required: true
  - type: textarea
    id: purpose
    attributes:
      label: "🎯 개선 목적"
      value: |
        - [ ] 코드 가독성 향상
        - [ ] 성능 개선 
        - [ ] 중복 코드 제거
        - [ ] 구조 개선
        - [ ] 기타:
    validations:
      required: true
  - type: textarea
    id: todo_list
    attributes:
      label: "✔️ 작업 목록"
      value: |
        - [ ] TODO1
        - [ ] TODO2
        - [ ] TODO3
    validations:
      required: true
  - type: textarea
    id: related_issue
    attributes:
      label: "🔗 관련 이슈"
      description: "관련된 이슈 번호를 적어주세요."
      value: "- #"