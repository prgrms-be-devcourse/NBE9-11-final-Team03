name: Java Spring Boot CI

# 트리거: main 브랜치로 Push되거나 Pull Request가 생성될 때 실행
on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. GitHub 서버로 소스 코드 체크아웃
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Java 21 설정 
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        
    # 3. Gradle 빌드 속도 향상을 위한 캐싱 설정 
    - name: Gradle Caching
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    # 4. 리눅스 환경에서 gradlew 실행 권한 부여
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 5. 빌드 및 테스트 수행
    - name: Build with Gradle
      run: ./gradlew build
