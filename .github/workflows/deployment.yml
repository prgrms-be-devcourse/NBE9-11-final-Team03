name: Backend CD Pipeline

on:
  push:
    branches: [ "main" ] # 배포 대상 브랜치

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # 1. [비밀정보 결합] GitHub Secrets에 숨겨둔 설정을 빌드 가상 환경에 파일로 복원합니다.
      - name: Create application-secret.yaml
        run: |
          mkdir -p src/main/resources
          echo "${{ secrets.SPRING_SECRET_YAML }}" > src/main/resources/application-secret.yaml

      # 2. JDK 설정 및 스프링 빌드 (복원된 secret 파일을 포함하여 JAR 완제품 생성)
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Gradle
        run: |
          chmod +x ./gradlew
          ./gradlew clean build -x test -Dspring.profiles.active=prod
      # 3. Docker Hub 가상 환경 로그인
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }} # ◀ GitHub Secrets에 도커 ID 등록 필요
          password: ${{ secrets.DOCKERHUB_PASSWORD }} # ◀ GitHub Secrets에 도커 패스워드 또는 토큰 등록 필요

      # 4. 도커 이미지 빌드 및 Private 레포지토리로 Push
      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/dev11-final-team03-service:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/dev11-final-team03-service:latest

      # 5. Docker Hub 푸시가 끝난 직후, 컴포즈 파일을 EC2 서버로 복사해 줍니다.
      - name: Copy compose-prod.yaml to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "compose-prod.yaml"      # 로컬(깃허브 가상공간)에 있는 이 파일을
          target: "/home/ubuntu/app"       # EC2 서버의 이 디렉토리로 복사한다!

      # 6. EC2 서버에 접속하여 최신 이미지로 교체 (Nginx 포트 8080 연결 유지)
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/app
            git pull origin main # compose-prod.yaml 파일 설정을 최신화하기 위해 pull 진행
            
            # 운영 전용 컴포즈 파일을 지정(-f)하여 백엔드만 새 이미지로 갱신
            docker compose -f compose-prod.yaml pull backend
            docker compose -f compose-prod.yaml up -d