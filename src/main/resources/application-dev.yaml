spring:
  config:
    import: optional:classpath:application-secret.yaml # 시크릿 파일 가져오기
  jpa:
    hibernate:
      ddl-auto: update # 엔티티 변경 시 테이블 구조 자동 반영 (기존 데이터 유지)
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace

app:
  cors:
    allowed-origins: http://localhost:3000