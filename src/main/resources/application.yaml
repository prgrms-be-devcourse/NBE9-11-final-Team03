spring:
  docker:
    compose:
      enabled: false   # 로컬은 H2 사용 — Docker Desktop 의존 제거
  application:
    name: baton
  profiles:
    active: local
  config:
    import: optional:classpath:application-secret.yaml

credit:
  initial-amount: 10000 # 초기 크레딧 금액 설정

escrow:
  confirmation-expiry-days: 7 # 구매 확정 만료 일수

user:
  initial-trust-score: 50.00 # 초기 신뢰 점수
  withdrawn-retention-day: 90 # 탈퇴 유저 정보 보관 기간 (일)

s3:
  presigned-put-expiry-minutes: 5 # 클라이언트 S3업로드 유효 시간 (분)
  presigned-get-expiry-hours: 3 # 조회 URL 유효 시간 (시간)
